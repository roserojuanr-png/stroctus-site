<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solutions | Stroctus</title>

  <style>
    :root {
      --bg: #07070c;
      --card: #121222;
      --text: #f2f2f7;
      --muted: #babacc;
      --accent: #8c5bff;
      --accent-2: #1fd1c5;
      --neon-blue: #4fc3f7;
      --neon-purple: #b388ff;
      --neon-pink: #ff4fd8;
      --neon-green: #9dff4f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top right, #181837 0%, var(--bg) 50%);
      color: var(--text);
      line-height: 1.5;
    }

    /* ---- NAV (shared) ---- */
    .site-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.9rem 1.75rem;
      background: rgba(7, 7, 12, 0.82);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-left, .nav-right {
      display: flex;
      align-items: center;
      gap: 1.75rem;
      flex-wrap: wrap;
    }

    .site-nav .logo {
      font-weight: 700;
      letter-spacing: 0.12em;
      font-size: 0.95rem;
      color: var(--text);
      text-transform: uppercase;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.15s ease;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--accent-2); }

    .nav-icons { display: flex; align-items: center; gap: 1.1rem; }

    .nav-icon-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.85rem;
      font-family: inherit;
      padding: 0;
    }

    .nav-icon-btn:hover { color: var(--text); }

    .container {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 2.5rem 0 4rem;
    }

    /* ---- LAYOUT ---- */
    .solutions-layout {
      display: grid;
      grid-template-columns: minmax(260px, 380px) 1fr;
      gap: 2rem;
      align-items: start;
    }

    /* ---- LEFT: VIDEO ---- */
    .video-panel {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(79, 195, 247, 0.35);
      box-shadow: 0 0 24px rgba(79, 195, 247, 0.25), 0 14px 30px rgba(0, 0, 0, 0.45);
      background: #000;
    }

    .video-panel video {
      width: 100%;
      display: block;
    }

    .video-mute {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: #f2f2f7;
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }

    .video-mute:hover { background: rgba(0, 0, 0, 0.85); }

    /* ---- RIGHT: ARCHITECTURE GRAPHIC ---- */
    .arch-panel {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(79, 195, 247, 0.35);
      box-shadow: 0 0 24px rgba(79, 195, 247, 0.2), 0 14px 30px rgba(0, 0, 0, 0.45);
      background: #000;
    }

    .arch-panel img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      text-align: center;
      color: var(--muted);
      margin-top: 3rem;
      font-size: 0.95rem;
    }

    @media (max-width: 860px) {
      .solutions-layout { grid-template-columns: 1fr; }
      .video-panel { max-width: 420px; margin: 0 auto; }
    }

    @media (max-width: 720px) {
      .site-nav { padding: 0.75rem 1rem; }
      .nav-links { gap: 1rem; }
      .nav-left, .nav-right { gap: 1rem; }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav class="site-nav">
    <div class="nav-left">
      <a class="logo" href="index.html">Stroctus</a>
      <ul class="nav-links">
        <li><a href="index.html#products">Products</a></li>
        <li><a href="solutions.html" class="active">Solutions</a></li>
        <li><a href="industries.html">Industries</a></li>
      </ul>
    </div>
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="pricing.html">Pricing</a></li>
        <li><a href="artists.html">Artists</a></li>
        <li><a href="support.html">Support</a></li>
      </ul>
      <div class="nav-icons">
        <button class="nav-icon-btn" aria-label="Search">&#128269;</button>
        <button class="nav-icon-btn" aria-label="Region">&#127760; US</button>
        <button class="nav-icon-btn" aria-label="Sign In">&#128100; Sign In</button>
      </div>
    </div>
  </nav>

  <div class="container">

    <div class="solutions-layout">

      <!-- LEFT: VIDEO -->
      <div class="video-panel">
        <video id="solutionsVideo" autoplay muted loop playsinline>
          <source src="/images/stroctus-solutions-video.mp4" type="video/mp4" />
        </video>
        <button type="button" class="video-mute" id="solutionsVideoMuteBtn" aria-label="Unmute video" onclick="var v=document.getElementById('solutionsVideo'); v.muted=!v.muted; if(!v.muted){ v.play().catch(function(){}); } this.textContent = v.muted ? '🔇' : '🔊';">&#128263;</button>
      </div>

      <!-- RIGHT: ARCHITECTURE GRAPHIC -->
      <div class="arch-panel">
        <img src="/images/solutions-architecture.jpg" alt="Stroctus AI Creative Intelligence Cloud: High Quality Audio, Music, Video, Score, Distribution and Marketing — Music Intelligence, Video Intelligence, Story Intelligence, Creative Ops Modules, Distribution, and Intelligent Marketing." />
      </div>

    </div>

    <footer>
      © Stroctus Records
    </footer>

  </div>

</body>
</html>
